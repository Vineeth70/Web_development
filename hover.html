<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }
        .container{
            display: flex;
            height:100vh;
            background-color: black;
            justify-content: center;
            align-items: center;
        }
        .sun{
            height:200px;
            width: 200px;
            border: 2px solid rgb(201, 201, 182);
            background-color: rgba(230, 222, 211, 0.822);
            box-shadow: 10px 10px 500px rgb(166, 229, 231), -10px -10px 500px rgb(166, 229, 231);
            border-radius: 50%;
        }
        .sun:hover{
            height:500px;
            width: 500px;
            border: 2px solid rgb(156, 156, 152);
            background-color: rgb(237, 231, 36);
            box-shadow: 10px 10px 50px rgb(219, 103, 19) , -10px -10px 5000px rgb(219, 103, 19);
            border-radius: 50%;
            transition-property: all;
            transition-duration: 1s;
            transition-timing-function: ease-in;
            
        
        }
        .container:has(.sun:hover){
            background-color: white;
            transition: background-color 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sun"></div>
    </div>
    
</body>
</html>
</body>
</html>
